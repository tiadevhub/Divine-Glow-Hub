<!DOCTYPE html>
<html>
<head>
<title>My Orders | Divine Glow Hub</title>

<style>

body{
    font-family:Poppins, sans-serif;
    background:linear-gradient(to right,#fff0f5,#fff8dc);
    margin:0;
    padding:0;
}

h1{
    text-align:center;
    margin-top:20px;
    color:#333;
}

.container{
    width:85%;
    max-width:800px;
    margin:30px auto;
}

.order-box{
    background:white;
    padding:20px;
    margin:20px 0;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.1);
    text-align:left;
    transition:0.3s;
}

.order-box:hover{
    transform:translateY(-5px);
    box-shadow:0 12px 25px rgba(0,0,0,0.15);
}

.order-box h3{
    margin:0;
    color:hotpink;
}

.order-box p{
    margin:5px 0;
    color:#555;
    font-size:14px;
}

.order-box b{
    color:#000;
}

.back-btn{
    display:block;
    width:max-content;
    margin:20px auto;
    padding:10px 18px;
    background:linear-gradient(45deg,#ff69b4,#ff85c1);
    color:white;
    text-decoration:none;
    border-radius:25px;
    font-size:14px;
    transition:0.3s;
}

.back-btn:hover{
    background:linear-gradient(45deg,#ff1493,#ff69b4);
    transform:scale(1.05);
}

.tracking{
    display:flex;
    justify-content:space-between;
    margin:15px 0;
    position:relative;
}

.tracking::before{
    content:'';
    position:absolute;
    top:12px;
    left:0;
    width:100%;
    height:4px;
    background:#ddd;
    z-index:0;
}

.step{
    text-align:center;
    position:relative;
    z-index:1;
    flex:1;
}

.circle{
    width:25px;
    height:25px;
    border-radius:50%;
    background:#ddd;
    margin:auto;
    line-height:25px;
    font-size:12px;
    color:white;
}

.step.active .circle{
    background:hotpink;
}

.step p{
    font-size:12px;
    margin-top:5px;
}

@media(max-width:600px){
    .container{
        width:95%;
    }
}

.cancel-btn{
    margin-top:10px;
    padding:10px 16px;
    border:none;
    border-radius:20px;
    background:#ff4d6d;
    color:white;
    cursor:pointer;
}

.cancel-btn:hover{
    opacity:.9;
}

</style>

</head>

<body>

<h1>My Orders 📦</h1>

<a href="index.html" class="back-btn">
⬅ Back to Website
</a>

<div class="container" id="orderList"></div>

<script>

// SAFE DATE PARSER

     function parseDateSafe(dateStr){

    if(!dateStr) return null;

    let d = new Date(dateStr);

    if(!isNaN(d.getTime())){

        // normalize to midnight
        d.setHours(0,0,0,0);
        return d;
    }

    let parts = dateStr.split("/");

    if(parts.length === 3){
        let day = parseInt(parts[0]);
        let month = parseInt(parts[1]) - 1;
        let year = parseInt(parts[2]);

        let newDate = new Date(year, month, day);
        newDate.setHours(0,0,0,0);
        return newDate;
    }

    return null;
}


// STATUS FUNCTION
function getOrderStatus(order){

    if(order.cancelled){
        return "❌ Cancelled";
    }

    const now = new Date();

    const dateObj = parseDateSafe(order.date);

    if(!dateObj){
        return "🟡 Order Placed";
    }

    const diffDays = Math.floor(
        Math.floor((now - dateObj) / (1000 * 60 * 60 * 24))
    );

    if(diffDays <= 0)
        return "🟡 Order Placed";

    else if(diffDays === 1)
        return "📦 Packed";

    else if(diffDays <= 3)
        return "🚚 Shipped";

    else if(diffDays <= 5)
        return "🛵 Out for Delivery";

    else
        return "✅ Delivered";
}


// TRACK STEP
function getStepNumber(orderDate){

    const now = new Date();

    const order = parseDateSafe(orderDate);

    if(!order){
        return 1;
    }

    const diffDays = Math.floor(
        (now.getTime() - order.getTime()) /
        (1000*60*60*24)
    );

    if(diffDays <= 0)
        return 1;

    else if(diffDays === 1)
        return 2;

    else if(diffDays <= 3)
        return 3;

    else if(diffDays <= 5)
        return 4;

    else
        return 5;
}


// MAIN
let container =
document.getElementById("orderList");

let currentUser =
localStorage.getItem("user");

if(!currentUser){

    container.innerHTML = `
    <h3 style='text-align:center;'>
    Please login first 🔐
    </h3>
    `;

}
else{

    let allOrders =
    JSON.parse(
        localStorage.getItem("orders")
    ) || [];

    let orders =
    allOrders.filter(
        order => order.user === currentUser
    );

    if(orders.length === 0){

        container.innerHTML = `
        <h3 style='text-align:center;'>
        No orders placed yet 😕
        </h3>
        `;

    }
    else{

        orders.forEach(order => {

            let itemsHTML = "";

            order.items.forEach(item => {

                itemsHTML += `
                <p>
                🛍 ${item.name}
                - ₹${item.price}
                </p>
                `;

            });

            let total =
            order.total ||
            order.items.reduce(
                (sum,item)=>sum+item.price,
                0
            );

            let orderId =
            order.orderId ||
            "DGH00000";

            let status =
            getOrderStatus(order);

            let step =
            order.cancelled
            ? 0
            : getStepNumber(order.date);

            container.innerHTML += `

            <div class="order-box">

            <h3>
            👤 ${order.user}
            </h3>

            <p>
            <b>Order ID:</b>
            ${orderId}
            </p>

            <p>
            <b>Date:</b>
            ${order.date}
            </p>

            <p>
            <b>Delivery Address:</b>
            ${order.address}
            </p>

            <p>
            <b>Phone:</b>
            ${order.phone}
            </p>

            <p>
            <b>Payment:</b>
            ${order.payment}
            </p>

            <p>
            <b>Status:</b>
            ${status}
            </p>

            <div class="tracking">

                <div class="step ${step>=1?'active':''}">
                    <div class="circle">1</div>
                    <p>Placed</p>
                </div>

                <div class="step ${step>=2?'active':''}">
                    <div class="circle">2</div>
                    <p>Packed</p>
                </div>

                <div class="step ${step>=3?'active':''}">
                    <div class="circle">3</div>
                    <p>Shipped</p>
                </div>

                <div class="step ${step>=4?'active':''}">
                    <div class="circle">4</div>
                    <p>Out</p>
                </div>

                <div class="step ${step>=5?'active':''}">
                    <div class="circle">5</div>
                    <p>Done</p>
                </div>

            </div>

            ${itemsHTML}

            <hr>

            <p style="
            font-weight:bold;
            color:green;
            ">
            Total: ₹${total}
            </p>

            ${
                (
                    status==="🟡 Order Placed"
                    ||
                    status==="📦 Packed"
                )
                ?
                `
                <button
                class="cancel-btn"
                onclick="cancelOrder('${orderId}')"
                >
                Cancel Order ❌
                </button>
                `
                :
                ""
            }

            </div>

            `;

        });

    }

}


// CANCEL ORDER
function cancelOrder(orderId){

    let orders =
    JSON.parse(
        localStorage.getItem("orders")
    ) || [];

    let index =
    orders.findIndex(
        o => o.orderId === orderId
    );

    if(index === -1)
        return;

    orders[index].cancelled = true;

    localStorage.setItem(
        "orders",
        JSON.stringify(orders)
    );

    alert("Order Cancelled ❌");

    location.reload();
}

</script>

</body>
</html>
