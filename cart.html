<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Your Cart | Divine Glow Hub</title>

<link rel="stylesheet" href="cart.css">

</head>

<body>

<h1>Your Cart 🛒</h1>
<a href="index.html">⬅ Continue Shopping</a>

<div class="cart-container" id="cart"></div>
<div class="total" id="total"></div>
<div id="summary"
style="
width:320px;
margin:20px auto;
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,.1);
display:none;
">
</div>

<div id="tracker"></div>

<h3>Delivery Details</h3>

<input type="text" id="name" placeholder="Full Name"><br><br>

<input type="text" id="house" placeholder="House No. / Flat No."><br><br>
<input type="text" id="area" placeholder="Area / Street"><br><br>
<input type="text" id="city" placeholder="City"><br><br>
<input type="text" id="pincode" placeholder="Pin Code"><br><br>
<input type="text" id="landmark" placeholder="Landmark (optional)"><br><br>

<input type="text" id="phone" placeholder="Phone Number"><br><br>

<h3>Payment Method</h3>

<select id="payment">

<option value="">
Select Payment
</option>

<option value="upi">
💳 UPI
</option>

<option value="cod">
💵 Cash on Delivery
</option>

</select>

<input type="text" id="upi" placeholder="Enter UPI ID" style="display:none;"><br><br>

<button class="place-btn" onclick="placeOrder()">Place Order</button>

<script>

let cartDiv, totalDiv;
let cart = [];
let total = 0;
let subtotal = 0;
let discount = 0;
let delivery = 0;
let finalTotal = 0;

// ✅ SINGLE CLEAN ONLOAD
window.onload = function(){

    let loggedIn = localStorage.getItem("loggedIn");

    if(loggedIn !== "true"){
        alert("Please login first 🔐");
        window.location.href = "login.html";
        return;
    }

    cartDiv = document.getElementById("cart");
    totalDiv = document.getElementById("total");

    cart = JSON.parse(localStorage.getItem("cart")) || [];

    displayCart();
};

// DISPLAY CART
function displayCart(){

cartDiv.innerHTML="";

subtotal=0;
discount=0;
delivery=0;
finalTotal=0;

let summary=document.getElementById("summary");
let tracker=document.getElementById("tracker");

if(cart.length===0){

cartDiv.innerHTML=
"<h3>Your cart is empty 🛒</h3>";

summary.style.display="none";

totalDiv.innerHTML="";

tracker.innerHTML="";

return;
}

// QUANTITY MERGE
let merged=[];

cart.forEach(item=>{

let existing=
merged.find(x=>x.name===item.name);

if(existing){

existing.qty++;

}
else{

merged.push({

...item,

qty:1

});

}

});

// DISPLAY
merged.forEach((item,index)=>{

let itemTotal=
item.price*item.qty;

let itemDiscount=0;

// QUANTITY DISCOUNT
if(item.qty===2){

itemDiscount=
itemTotal*0.05;

}

if(item.qty>=3){

itemDiscount=
itemTotal*0.10;

}

discount+=itemDiscount;

subtotal+=itemTotal;

cartDiv.innerHTML+=`

<div class="item">

<span>

${item.name}

<br>

₹${item.price}

<br>

Qty × ${item.qty}

</span>

<button
onclick="removeItem(${index})">

Remove

</button>

</div>

`;

});

// CART VALUE DISCOUNT
if(subtotal>=2000){

discount+=300;

}
else if(subtotal>=1500){

discount+=150;

}

// DELIVERY
if(subtotal>=2000){

delivery=0;

tracker.innerHTML=
"🚚 FREE Delivery Applied";

}

else{

delivery=40;

let left=
2000-subtotal;

tracker.innerHTML=

`
<p>

Add ₹${left}

more for FREE delivery 🚚

</p>

`;

}

finalTotal=
subtotal-discount+delivery;

summary.style.display=
"block";

summary.innerHTML=

`

<h3>

Order Summary

</h3>

<p>

Items:
${merged.length}

</p>

<p>

Subtotal:
₹${subtotal}

</p>

<p>

Discount:
₹${Math.round(discount)} Saved 🎉

</p>

<p>

Delivery:
₹${delivery}

</p>

<hr>

<h3>

Total:
₹${Math.round(finalTotal)}

</h3>

`;

total=
finalTotal;

totalDiv.innerHTML=
"";
}


// REMOVE ITEM
function removeItem(index){
    cart.splice(index,1);
    localStorage.setItem("cart",JSON.stringify(cart));
    displayCart();
}

// PLACE ORDER
function placeOrder(){

    let currentCart = JSON.parse(localStorage.getItem("cart")) || [];

    let name = document.getElementById("name").value.trim();
    let house = document.getElementById("house").value.trim();
    let area = document.getElementById("area").value.trim();
    let city = document.getElementById("city").value.trim();
    let pincode = document.getElementById("pincode").value.trim();
    let landmark = document.getElementById("landmark").value.trim();

    let phone = document.getElementById("phone").value.trim();
    let payment = document.getElementById("payment").value;
    let upi = document.getElementById("upi").value.trim();

    if(currentCart.length === 0){
        alert("Cart is empty ❌");
        return;
    }

    if(!name){
        alert("Enter name ❌");
        return;
    }

    if(!house || !area || !city || !pincode){
        alert("Fill all address fields ❌");
        return;
    }

    if(!/^[0-9]{6}$/.test(pincode)){
        alert("Enter valid 6 digit pincode ❌");
        return;
    }

    let address = house + ", " + area + ", " + city + " - " + pincode;

    if(landmark){
        address += " (Near " + landmark + ")";
    }

    if(payment === ""){
        alert("Select payment method 💳");
        return;
    }

    if(payment === "upi"){
        if(!upi){
            alert("Enter UPI ID ❌");
            return;
        }

        let upiPattern = /^[\w.-]+@[\w.-]+$/;

        if(!upiPattern.test(upi)){
            alert("Invalid UPI ID ❌");
            return;
        }
    }

    if(!/^[0-9]{10}$/.test(phone)){
        alert("Enter valid 10 digit phone ❌");
        return;
    }

    let orders = JSON.parse(localStorage.getItem("orders")) || [];
    let user = localStorage.getItem("user") || "Guest";

    let orderId =
"DGH"+
Math.floor(
10000+
Math.random()*90000
);

// SAVE DELIVERY DETAILS
localStorage.setItem(
"deliveryDetails",

JSON.stringify({

name,
house,
area,
city,
pincode,
landmark,
phone

})

);

orders.push({

user,

items: currentCart,

orderId,

total: finalTotal,

date: new Date().toLocaleString(),

address,

phone,

payment

});

    localStorage.setItem("orders", JSON.stringify(orders));

    localStorage.removeItem("cart");

    alert(
"Order Placed Successfully 🎉\n\nOrder ID: " +
orderId
);

    window.location.href = "orders.html";
}

// PAYMENT TOGGLE
document.getElementById("payment").addEventListener("change", function(){
    let upiField = document.getElementById("upi");

    if(this.value === "upi"){
        upiField.style.display = "block";
    } else {
        upiField.style.display = "none";
        upiField.value = "";
    }
});


</script>

</body>
</html>
